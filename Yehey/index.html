/* ---------------- Render Category Cards ---------------- */
function renderCategories(){
  categoryGrid.innerHTML='';
  CATEGORY_DATA.forEach(cat=>{
    const card=document.createElement('div');
    card.className='category-card';
    card.innerHTML=`
      <div class="cat-title"><span class="emoji">${cat.icon}</span> ${cat.label}</div>
      <span class="sel-badge hidden" data-badge="${cat.key}"></span>
      <div class="cat-sub">Tap to choose</div>`;
    card.addEventListener('click',()=>openPicker({
      title:`${cat.icon} ${cat.label}`,
      subtitle:'Tap items to select, then confirm',
      items:cat.items,
      seed:()=>new Set(cat.items.filter(i=>state.ingredients.has(i))),
      apply:(temp)=>{ cat.items.forEach(i=>state.ingredients.delete(i)); temp.forEach(i=>state.ingredients.add(i)); },
      ctaText:'Add to My Ingredients'
    }, card));
    categoryGrid.appendChild(card);
  });
  updateCategoryCounts();
}

/* ---------------- Modal Picker ---------------- */
let lastFocusEl = null, tempSet=null;
function openPicker(cfg, anchorEl){
  lastFocusEl = anchorEl || document.activeElement;
  tempSet = cfg.seed();
  modalTitle.textContent = cfg.title;
  modalSub.textContent   = cfg.subtitle;
  confirmBtn.textContent = cfg.ctaText || 'Confirm';

  const draw = ()=>{
    modalBody.innerHTML = `<div class="chips">${
      cfg.items.map(v=>`<span class="chip ${tempSet.has(v)?'is-selected':''}" data-val="${v}">${v}</span>`).join('')
    }</div>`;
  };
  draw();

  modalBody.onclick = (e)=>{
    const chip=e.target.closest('.chip'); if(!chip) return;
    const val=chip.dataset.val;
    tempSet.has(val) ? tempSet.delete(val) : tempSet.add(val);
    draw();
  };
  confirmBtn.onclick = ()=>{
    cfg.apply(tempSet);
    renderCart();
    closeModal();
  };
  showModal();
}
function showModal(){ modal.classList.add('open'); modal.setAttribute('aria-hidden','false'); confirmBtn.focus(); }
function closeModal(){ modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); confirmBtn.onclick=null; if(lastFocusEl?.focus) lastFocusEl.focus(); }
modal.addEventListener('click',(e)=>{ if(e.target.closest('[data-dismiss]')) closeModal(); });
modal.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeModal(); });

function renderCart(){
  cartTags.innerHTML='';
  const ings=[...state.ingredients], cts=[...state.countries];
  cartTitle.textContent = (ings.length+cts.length) ? 'My Ingredients & Cuisines' : 'Add ingredients or pick at least one category/cuisine.';
  ings.forEach(i=>{
    const tag=document.createElement('span');
    tag.className='itag';
    tag.innerHTML=`${capitalize(i)} <button aria-label="Remove ${i}" data-x="${i}" data-xtype="ing">✕</button>`;
    cartTags.appendChild(tag);
  });
  cts.forEach(c=>{
    const tag=document.createElement('span');
    tag.className='itag country';
    tag.innerHTML=`${c} <button aria-label="Remove ${c}" data-x="${c}" data-xtype="ctr">✕</button>`;
    cartTags.appendChild(tag);
  });
  updateCategoryCounts();
  updateRegionCounts();
}
cartTags.addEventListener('click',(e)=>{
  const btn=e.target.closest('button[data-x]'); if(!btn) return;
  if(btn.dataset.xtype==='ctr'){ state.countries.delete(btn.dataset.x); }
  else { state.ingredients.delete(btn.dataset.x.toLowerCase()); }
  renderCart();
});
function updateCategoryCounts(){
  CATEGORY_DATA.forEach(cat=>{
    const count=cat.items.reduce((n,i)=>n+(state.ingredients.has(i)?1:0),0);
    const badge=document.querySelector(`[data-badge="${cat.key}"]`);
    if(!badge) return;
    if(count>0){ badge.textContent=count; badge.classList.remove('hidden'); }
    else { badge.textContent=''; badge.classList.add('hidden'); }
  });
}
function updateRegionCounts(){
  REGION_DATA.forEach(r=>{
    const count=r.countries.reduce((n,c)=>n+(state.countries.has(c)?1:0),0);
    const badge=document.querySelector(`[data-region-badge="${r.key}"]`);
    if(!badge) return;
    if(count>0){ badge.textContent=count; badge.classList.remove('hidden'); }
    else { badge.textContent=''; badge.classList.add('hidden'); }
  });
}

/* ---------------- Input & Buttons ---------------- */
function capitalize(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }

function commitInput(){
  const parts=input.value.split(',').map(s=>s.trim()).filter(Boolean);
  parts.forEach(p=>state.ingredients.add(p.toLowerCase()));
  input.value='';
  renderCart();
}

input.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); commitInput(); }});
input.addEventListener('input',()=>{
  if(input.value.includes(',')){
    const arr=input.value.split(','), last=arr.pop();
    arr.map(s=>s.trim()).filter(Boolean).forEach(p=>state.ingredients.add(p.toLowerCase()));
    input.value=last.trim();
    renderCart();
  }
});

  state.countries.clear();

  resultsStatus.textContent='';

    const reg=REGION_DATA[Math.floor(Math.random()*REGION_DATA.length)];

    state.countries.add(country);
  } else {

    const pick=pool[Math.floor(Math.random()*pool.length)];

  const lines = (instructions || '').split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(lines.length > 1){
    stepsBody.innerHTML = `<ol class="steps-list">${lines.map(l=>`<li>${escapeHtml(l)}</li>`).join('')}</ol>`;
  } else {
    stepsBody.innerHTML = `<p>${escapeHtml(instructions || 'No instructions available.')}</p>`;
  }
  stepsModal.classList.add('open');
  stepsModal.setAttribute('aria-hidden','false');
}
function closeStepsModal(){
  stepsModal.classList.remove('open');
  stepsModal.setAttribute('aria-hidden','true');

/* ---------------- Ingredient normalization + flexible match ---------------- */
const SYNONYMS = new Map([
  ['ground beef','beef'],
  ['minced beef','beef'],
  ['beef steak','beef'],
  ['chicken breast','chicken'],
  ['chicken thigh','chicken'],
  ['whole chicken','chicken'],
  ['ground pork','pork'],
  ['pork belly','pork'],
  ['sardines (canned)','sardines'],
  ['bangus (milkfish)','milkfish'],
  ['ampalaya (bitter gourd)','bitter gourd'],
  ['red onion','onion'],
  ['spring onion','green onion'],
  ['scallion','green onion'],
  ['bell pepper','pepper'],
  ['capsicum','pepper'],
  ['chili pepper','chile'],
  ['chili','chile'],
  ['chilli','chile'],
  ['calamansi','lime'],
  ['brown sugar','sugar'],
  ['evaporated milk','milk'],
  ['condensed milk','milk'],
  ['all-purpose cream','cream'],
  ['loaf bread','bread'],
  ['whole wheat bread','bread'],
  ['pandesal','bread'],
  ['baguette','bread'],
  ['burger buns','bread'],
  ['hotdog buns','bread'],
  ['banana ketchup','ketchup'],
  ['cane vinegar','vinegar'],
  ['olive oil','oil'],
  ['vegetable oil','oil'],
  ['sesame oil','oil'],
  ['soy sauce','soysauce'],
  ['fish sauce','fishsauce'],
  ['black pepper','pepper'],
  ['bagoong (shrimp paste)','shrimp paste'],
  ['white rice','rice'],
  ['brown rice','rice'],
  ['jasmine rice','rice'],
  ['fried rice','rice'],
  ['egg fried rice','rice'],
  ['scrambled eggs','egg'],
  ['eggs','egg']
]);

const OPTIONAL_PANTRY = new Set([
  'salt','pepper','oil','water','sugar','soy sauce','soysauce','vinegar',
  'fish sauce','fishsauce','butter','garlic','onion'
]);

const CORE_HINTS = new Set([
  'rice','egg','chicken','pork','beef','fish','shrimp','noodles','pasta',
  'bread','potato','tomato','milk','cheese','tuna'
]);

function baseNormalize(s){
  return (s || '')
    .toLowerCase()
    .replace(/\([^)]*\)/g, ' ')
    .replace(/[^a-z0-9\s-]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function singularize(word){
  if (!word) return word;
  if (word.endsWith('ies') && word.length > 4) return word.slice(0, -3) + 'y';
  if (word.endsWith('es') && word.length > 3) return word.slice(0, -2);
  if (word.endsWith('s') && word.length > 3) return word.slice(0, -1);
  return word;
}

function norm(x){
  let s = baseNormalize(x);
  if (SYNONYMS.has(s)) s = SYNONYMS.get(s);
  s = baseNormalize(s);
  return s;
}

function tokensOf(s){
  return norm(s).split(' ').map(singularize).filter(Boolean);
}

function ingredientMatches(userIng, recipeIng){
  const a = norm(userIng);
  const b = norm(recipeIng);
  if (!a || !b) return false;
  if (a === b) return true;
  if (a.includes(b) || b.includes(a)) return true;

  const at = tokensOf(a);
  const bt = tokensOf(b);

  if (!at.length || !bt.length) return false;

  const overlap = at.filter(t => bt.includes(t));
  if (overlap.length >= 1) return true;

  return false;
}

function uniqueNormalized(arr){
  const out = [];
  const seen = new Set();
  for (const item of arr || []) {
    const n = norm(item);
    if (n && !seen.has(n)) {
      seen.add(n);
      out.push(n);
    }
  }
  return out;
}

function scoreRecipe(recipe, inputSet, chosenCountries){
  const recipeIngredients = uniqueNormalized(recipe.ingredients || []);
  const inputIngredients = [...inputSet];
  const matchedList = [];
  const missingList = [];

  for (const userIng of inputIngredients) {
    const hasMatch = recipeIngredients.some(recIng => ingredientMatches(userIng, recIng));
    if (hasMatch) matchedList.push(userIng);
  }

  for (const recIng of recipeIngredients) {
    const hasInputMatch = inputIngredients.some(userIng => ingredientMatches(userIng, recIng));
    if (!hasInputMatch && !OPTIONAL_PANTRY.has(recIng)) {
      missingList.push(recIng);
    }
  }

  const matched = matchedList.length;
  const coverage = inputIngredients.length ? matched / inputIngredients.length : 0;
  const missing = missingList.length;

  let cuisineBoost = 0;
  if (chosenCountries.size) {
    const chosenCuisineSlugs = [...chosenCountries]
      .map(c => (COUNTRY_TO_CUISINE[c] || '').toLowerCase())
      .filter(Boolean);

    const recipeCuisine = (recipe.cuisine || '').toLowerCase();
    const recipeCountry = (recipe.country || '').toLowerCase();

    if ([...chosenCountries].some(c => recipeCountry.includes(c.toLowerCase()))) {
      cuisineBoost += 0.12;
    }

    if (chosenCuisineSlugs.some(c => recipeCuisine.includes(c))) {
      cuisineBoost += 0.12;
    }
  }

  let titleBoost = 0;
  const title = norm(recipe.title || '');
  inputIngredients.forEach(ing => {
    const n = norm(ing);
    if (n && title.includes(n)) titleBoost += 0.08;
  });

  let coreBoost = 0;
  matchedList.forEach(ing => {
    if (CORE_HINTS.has(norm(ing))) coreBoost += 0.05;
  });

  const sourceBoost =
    recipe.sourceType === 'api' ? 0.08 :
    recipe.sourceType === 'search' ? 0.02 : 0;

  const score =
    coverage * 0.55 +
    (1 / (1 + missing)) * 0.20 +
    cuisineBoost +
    Math.min(titleBoost, 0.20) +
    Math.min(coreBoost, 0.15) +
    sourceBoost;

  return {
    score,
    coverage,
    missing,
    matchedList,
    missingList
  };
}

function escapeHtml(str){
  return (str || '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

/* ---------------- Apply filters on latestResults and render ---------------- */
function applyFiltersAndRender(){
  if(!latestResults.length){
    resultsBody.innerHTML = `<div class="loading">No results yet. Add ingredients and tap Generate Recipes.</div>`;
    resultsStatus.textContent = '';
    return;
  }

  let list = [...latestResults];
  const maxMiss = parseInt(maxMissing.value,10);

  list = list.filter(r => r.missing <= maxMiss);

  if(onlyFull.checked){
    list = list.filter(r => r.coverage === 1 && r.missing === 0);
  }

  const mode = sortBy.value;
  if(mode === 'missing') list.sort((a,b)=> a.missing - b.missing || b.coverage - a.coverage || b.score - a.score);
  else if(mode === 'coverage') list.sort((a,b)=> b.coverage - a.coverage || a.missing - b.missing || b.score - a.score);
  else list.sort((a,b)=> b.score - a.score || b.coverage - a.coverage || a.missing - b.missing);

  renderRecipeResults(list);
}

/* ---------------- Render recipe cards ---------------- */
function renderRecipeResults(list){
  resultsStatus.textContent = `${list.length} result${list.length!==1?'s':''}`;

  if(!list.length){
    resultsBody.innerHTML = `<div class="loading">No matches for this filter. Try increasing “Max missing” or untick “Only full matches”.</div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'recipes';
  grid.innerHTML = list.map(r => {
    const pct = Math.round(r.coverage * 100);
    const full = (r.coverage === 1 && r.missing === 0);
    const missingStr = r.missingList?.slice(0,3).map(capitalize).join(', ') + (r.missingList && r.missingList.length > 3 ? '…' : '');
    const hasSteps = !!(r.instructions && r.instructions.trim().length);
    const sourceLabel =
      r.sourceType === 'search' ? 'Web fallback' :
      r.sourceType === 'api' ? 'Recipe API' :
      (r.source || '');

    return `
    <article class="recipe-card">
      <img class="recipe-thumb" src="${r.image || ''}" alt="" onerror="this.style.display='none'"/>
      <div class="recipe-body">
        <h3 class="recipe-title">${escapeHtml(r.title || '')}</h3>
        <div class="recipe-meta">
          <span class="badge">${isNaN(pct)?'—':pct+'% match'}</span>
          ${full ? `<span class="badge">✅ Strong match</span>` :
            (typeof r.missing==='number' ? `<span class="missing">+${r.missing} needed${r.missing ? ': ' + (missingStr || '') : ''}</span>` : '')
          }
          <span>${capitalize(r.cuisine || '')}${r.country ? ' • '+escapeHtml(r.country) : ''}${sourceLabel ? ' • '+escapeHtml(sourceLabel) : ''}</span>
        </div>
      </div>
      <div class="recipe-actions">
        ${hasSteps ? `<button type="button" class="view-steps" data-rid="${r.id}">View Steps</button>` : ''}
        <a href="${r.url || '#'}" target="_blank" rel="noopener">Open</a>
      </div>
    </article>`;
  }).join('');

  resultsBody.innerHTML = '';
  resultsBody.appendChild(grid);
}

/* ---------------- View Steps button handler ---------------- */
resultsBody.addEventListener('click', e => {
  const btn = e.target.closest('.view-steps');
  if(!btn) return;
  const id = btn.dataset.rid;
  const rec = latestResults.find(r => String(r.id) === String(id));
  if(rec && rec.instructions){
    openStepsModal(rec.title, rec.instructions);
  } else if (rec) {
    openStepsModal(rec.title, 'No instructions available for this recipe.');
  }
});

/* ---------------- Generate Recipes ---------------- */
generateBtn.addEventListener('click', async ()=>{
  const ingredients = [...state.ingredients].map(norm).filter(Boolean);
  const countries   = [...state.countries];

  if(ingredients.length === 0 && countries.length === 0){
    openResults();
    resultsBody.innerHTML = `<div class="loading">Add at least one ingredient or choose a region first 😊</div>`;
    resultsStatus.textContent = '';
    return;
  }

  resultsBody.innerHTML = `<div class="loading"><span class="spinner"></span><span>Finding recipes…</span></div>`;
  resultsStatus.textContent = '';
  openResults();

  const cuisines = countries
    .map(c => COUNTRY_TO_CUISINE[c])
    .filter(Boolean);

  const cuisineParam = cuisines.join(',');
  const ingredientsQuery = ingredients.join(', ');

  try{
    const url = `/api/recipes?q=${encodeURIComponent(ingredientsQuery)}&cuisine=${encodeURIComponent(cuisineParam)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Search failed');

    const data = await res.json();
    const ingSet = new Set(ingredients);
    const countrySet = new Set(countries);

    latestResults = (data.results || []).map(r => {
      const scored = scoreRecipe(r, ingSet, countrySet);
      return { ...r, ...scored };
    });

    latestResults = latestResults
      .filter(r => r.coverage > 0 || r.sourceType === 'search')
      .sort((a,b)=> b.score - a.score);

    if(!latestResults.length){
      resultsBody.innerHTML = `<div class="loading">No recipes found yet. Try fewer ingredients, like “rice, egg” instead of a long list.</div>`;
      resultsStatus.textContent = '';
      return;
    }

    maxMissingVal.textContent = maxMissing.value;
    applyFiltersAndRender();
  } catch(err){
    console.error(err);
    resultsBody.innerHTML = `<div class="loading">Error contacting recipe service. Please try again later.</div>`;
    resultsStatus.textContent = '';
  }
});

/* ---------------- Boot ---------------- */
renderCategories();
renderRegions();
renderCart();
</script>
